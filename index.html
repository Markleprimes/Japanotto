<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Japanotto</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#0d0d0d; --surface:#161616; --surface2:#1e1e1e;
  --border:#2a2a2a; --accent:#e8d5a3; --accent2:#c9a84c;
  --text:#f0ece4; --muted:#555; --danger:#c0392b; --playing:#4ade80;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; overflow:hidden; }
.app { display:flex; flex-direction:column; height:100dvh; max-width:480px; margin:0 auto; }

/* HEADER */
.header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px 12px; border-bottom:1px solid var(--border); flex-shrink:0; gap:8px; }
.header-title { font-size:1.3rem; font-weight:800; letter-spacing:-0.03em; white-space:nowrap; }
.header-title span { color:var(--accent2); }
.header-actions { display:flex; gap:7px; align-items:center; flex-shrink:0; }
.icon-btn { width:36px; height:36px; border-radius:9px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:0.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
.icon-btn:active { background:var(--surface2); }
.icon-btn.active-toggle { border-color:var(--accent2); color:var(--accent2); }
.play-all-btn { padding:6px 11px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); color:var(--accent); font-family:'Syne',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:0.08em; cursor:pointer; text-transform:uppercase; white-space:nowrap; }

/* TOOLBAR (romaji toggle + count) */
.toolbar { display:flex; align-items:center; justify-content:space-between; padding:7px 18px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.ro-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.ro-toggle-label { font-size:0.68rem; font-family:'Syne Mono',monospace; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
.toggle-pill { width:34px; height:18px; border-radius:9px; background:var(--border); position:relative; transition:background 0.2s; flex-shrink:0; }
.toggle-pill.on { background:var(--accent2); }
.toggle-pill::after { content:''; position:absolute; width:12px; height:12px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left 0.2s; }
.toggle-pill.on::after { left:19px; }
.note-count { font-size:0.65rem; font-family:'Syne Mono',monospace; color:var(--muted); }

/* VIEWS */
.view { display:none; flex-direction:column; flex:1; overflow:hidden; }
.view.active { display:flex; }

/* SEARCH */
.search-wrap { padding:10px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 13px; color:var(--text); font-family:'Syne Mono',monospace; font-size:0.82rem; outline:none; transition:border-color 0.15s; }
.search-input:focus { border-color:var(--accent2); }
.search-input::placeholder { color:var(--muted); }

/* NOTE LIST */
.notes-list { flex:1; overflow-y:auto; padding:6px 0 110px; -webkit-overflow-scrolling:touch; }

.note-card { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); gap:12px; }
.note-card.playing { background:#152010; border-left:3px solid var(--playing); padding-left:13px; }
.note-card-body { flex:1; min-width:0; cursor:pointer; }

/* furigana / main JP text */
.note-jp { font-family:'Noto Sans JP',sans-serif; font-size:1rem; line-height:1.5; }
.note-jp ruby { ruby-position:over; }
.note-jp rt { font-size:0.55em; color:var(--accent2); letter-spacing:0.05em; }

.note-ro { font-size:0.7rem; color:var(--accent2); font-family:'Syne Mono',monospace; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:all 0.2s; }
.note-ro.hidden { opacity:0; max-height:0; margin:0; pointer-events:none; }
.note-en { font-size:0.7rem; color:var(--muted); font-family:'Syne Mono',monospace; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.note-cat-tag { display:inline-block; font-size:0.55rem; padding:1px 6px; border-radius:4px; border:1px solid var(--border); color:var(--muted); font-family:'Syne Mono',monospace; letter-spacing:0.08em; text-transform:uppercase; margin-top:4px; }

.note-card-play { width:34px; height:34px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--accent); font-size:0.8rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; }
.note-card.playing .note-card-play { background:var(--playing); color:#000; border-color:var(--playing); }

.empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state .big { font-size:2.5rem; margin-bottom:12px; }
.empty-state p { font-size:0.78rem; line-height:1.7; font-family:'Syne Mono',monospace; }

/* EDITOR */
.editor-header { display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.back-btn { background:none; border:none; color:var(--accent); font-size:1.1rem; cursor:pointer; padding:4px; }
.editor-header-title { flex:1; font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-family:'Syne Mono',monospace; }
.editor-body { flex:1; display:flex; flex-direction:column; padding:14px; gap:11px; overflow-y:auto; }
.field-label { font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; font-family:'Syne Mono',monospace; display:flex; align-items:center; gap:6px; }
.ai-badge { font-size:0.55rem; padding:1px 5px; border-radius:3px; background:var(--surface2); border:1px solid var(--accent2); color:var(--accent2); }
.field-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 13px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:1rem; outline:none; resize:none; transition:border-color 0.15s; line-height:1.6; }
.field-input:focus { border-color:var(--accent2); }
.field-input::placeholder { color:var(--muted); font-size:0.82rem; font-family:'Syne Mono',monospace; }
.field-input.small { font-family:'Syne Mono',monospace; font-size:0.82rem; }
.cat-suggestions { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.cat-chip { padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Syne Mono',monospace; font-size:0.65rem; cursor:pointer; transition:all 0.12s; text-transform:uppercase; }
.cat-chip:active { background:var(--surface2); border-color:var(--accent2); color:var(--accent); }
.editor-footer { display:flex; gap:9px; padding:11px 14px; border-top:1px solid var(--border); flex-shrink:0; }
.btn-full { flex:1; padding:12px; border-radius:11px; border:none; font-family:'Syne',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; transition:all 0.15s; }
.btn-save { background:var(--accent2); color:#000; }
.btn-save:active { background:var(--accent); }
.btn-ai { background:var(--surface2); color:var(--accent); border:1px solid var(--border); flex:0 0 auto; padding:12px 14px; border-radius:11px; font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; }
.btn-delete { background:var(--surface2); color:var(--danger); border:1px solid var(--border); flex:0 0 44px; font-size:0.95rem; border-radius:11px; cursor:pointer; }

/* PLAYER */
.player-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); padding:11px 16px 22px; display:none; flex-direction:column; gap:9px; z-index:100; }
.player-bar.visible { display:flex; }
.player-now { display:flex; align-items:center; gap:12px; }
.player-dot { width:7px; height:7px; border-radius:50%; background:var(--playing); flex-shrink:0; animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.player-text { flex:1; min-width:0; }
.player-jp { font-family:'Noto Sans JP',sans-serif; font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-en { font-size:0.63rem; color:var(--muted); font-family:'Syne Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.player-controls { display:flex; align-items:center; justify-content:center; gap:14px; }
.ctrl-btn { background:none; border:none; color:var(--text); font-size:1.25rem; cursor:pointer; padding:6px; opacity:0.65; }
.ctrl-btn.main { width:44px; height:44px; border-radius:50%; background:var(--accent2); color:#000; font-size:1rem; opacity:1; display:flex; align-items:center; justify-content:center; }
.speed-row { display:flex; gap:7px; justify-content:center; }
.speed-chip { padding:3px 11px; border-radius:20px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Syne Mono',monospace; font-size:0.65rem; cursor:pointer; }
.speed-chip.active { background:var(--surface2); border-color:var(--accent2); color:var(--accent); }

/* FAB */
.fab { position:fixed; bottom:22px; right:calc(50% - 222px); width:52px; height:52px; border-radius:50%; background:var(--accent2); color:#000; font-size:1.5rem; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 18px rgba(200,168,76,0.35); z-index:99; }
.fab.hidden { display:none; }

/* TOAST */
.toast { position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-70px); background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:9px 16px; font-size:0.75rem; font-family:'Syne Mono',monospace; color:var(--text); z-index:200; transition:transform 0.25s ease; white-space:nowrap; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok { border-color:var(--playing); color:var(--playing); }
.toast.err { border-color:var(--danger); color:var(--danger); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">Japa<span>notto</span></div>
    <div class="header-actions">
      <button class="play-all-btn" onclick="playAll()">▶ All</button>
      <button class="icon-btn" onclick="showEditor(null)" title="New note">＋</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="ro-toggle" onclick="toggleRomaji()">
      <div class="toggle-pill" id="roTogglePill"></div>
      <span class="ro-toggle-label">Show Romaji</span>
    </div>
    <span class="note-count" id="noteCount">0 notes</span>
  </div>

  <!-- LIST VIEW -->
  <div class="view active" id="viewList">
    <div class="search-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="Search…" oninput="renderList()" autocomplete="off"/>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- EDITOR VIEW -->
  <div class="view" id="viewEditor">
    <div class="editor-header">
      <button class="back-btn" onclick="showList()">←</button>
      <div class="editor-header-title" id="editorLabel">New Note</div>
      <button class="icon-btn" onclick="speakCurrent()" title="Listen">🔊</button>
    </div>
    <div class="editor-body">

      <div>
        <div class="field-label">Japanese / Hiragana / Kanji</div>
        <textarea class="field-input" id="fieldJp" rows="3" placeholder="あした　／　一緒　／　kanji ok too…"></textarea>
      </div>

      <div>
        <div class="field-label">Romaji <span style="color:var(--muted);font-size:0.55rem">(optional)</span></div>
        <input class="field-input small" type="text" id="fieldRo" placeholder="ashita…"/>
      </div>

      <div>
        <div class="field-label">Furigana <span style="color:var(--muted);font-size:0.55rem">(hiragana reading of kanji, optional)</span></div>
        <input class="field-input small" type="text" id="fieldFuri" placeholder="いっしょ  ← reading for 一緒"/>
      </div>

      <div>
        <div class="field-label">Meaning / English</div>
        <textarea class="field-input small" id="fieldEn" rows="2" placeholder="together, tomorrow…"></textarea>
      </div>

      <div>
        <div class="field-label">
          Category
          <span class="ai-badge">AI auto</span>
        </div>
        <input class="field-input small" type="text" id="fieldCat" placeholder="leave blank → AI will guess…"/>
        <div class="cat-suggestions">
          <button class="cat-chip" onclick="setCat('Vocab')">Vocab</button>
          <button class="cat-chip" onclick="setCat('Grammar')">Grammar</button>
          <button class="cat-chip" onclick="setCat('Phrase')">Phrase</button>
          <button class="cat-chip" onclick="setCat('Verb')">Verb</button>
          <button class="cat-chip" onclick="setCat('Time')">Time</button>
          <button class="cat-chip" onclick="setCat('Direction')">Direction</button>
          <button class="cat-chip" onclick="setCat('Expression')">Expression</button>
          <button class="cat-chip" onclick="setCat('Greeting')">Greeting</button>
        </div>
      </div>

    </div>
    <div class="editor-footer">
      <button class="btn-delete" id="btnDelete" onclick="deleteNote()" style="display:none">🗑</button>
      <button class="btn-ai btn-full" onclick="aiEnhance()" id="btnAI">✦ AI Fill</button>
      <button class="btn-full btn-save" onclick="saveNote()">Save</button>
    </div>
  </div>

  <!-- PLAYER BAR -->
  <div class="player-bar" id="playerBar">
    <div class="player-now">
      <div class="player-dot"></div>
      <div class="player-text">
        <div class="player-jp" id="playerJp">—</div>
        <div class="player-en" id="playerEn">—</div>
      </div>
      <button class="icon-btn" onclick="stopAll()" style="color:var(--danger);font-size:0.75rem">✕</button>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="playPrevItem()">⏮</button>
      <button class="ctrl-btn main" id="btnPause" onclick="togglePause()">⏸</button>
      <button class="ctrl-btn" onclick="playNextItem()">⏭</button>
    </div>
    <div class="speed-row">
      <button class="speed-chip" onclick="setSpeed(0.65,this)">Slow</button>
      <button class="speed-chip active" onclick="setSpeed(0.9,this)">Normal</button>
      <button class="speed-chip" onclick="setSpeed(1.2,this)">Fast</button>
    </div>
  </div>

</div>
<button class="fab" id="fab" onclick="showEditor(null)">＋</button>
<div class="toast" id="toast"></div>

<script>
const STORE_KEY = 'japanotto_v2';
const API_URL   = 'https://api.anthropic.com/v1/messages';

let notes = [];
let editingId = null;
let showRomaji = false;
let playQueue = [], playIdx = 0, isPaused = false, speed = 0.9;
let voices = [];

// ── TOAST ──
let toastTimer;
function toast(msg, type='') {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  toastTimer = setTimeout(() => el.className = 'toast', 2600);
}

// ── ROMAJI TOGGLE ──
function toggleRomaji() {
  showRomaji = !showRomaji;
  document.getElementById('roTogglePill').className = 'toggle-pill' + (showRomaji ? ' on' : '');
  localStorage.setItem('japanotto_romaji', showRomaji ? '1' : '0');
  renderList();
}

// ── STORAGE ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(notes)); }
function loadLocal() {
  try { notes = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { notes = []; }
  showRomaji = localStorage.getItem('japanotto_romaji') === '1';
  document.getElementById('roTogglePill').className = 'toggle-pill' + (showRomaji ? ' on' : '');
  if (!notes.length) seedNotes();
}

// ── AI HELPERS ──
async function callAI(prompt) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const d = await r.json();
  return d.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
}

async function autoCategory(jp, en) {
  try {
    const raw = await callAI(
      `Given this Japanese note:
JP: "${jp}"
EN: "${en}"
Pick exactly ONE category from: Vocab, Grammar, Phrase, Verb, Time, Direction, Expression, Greeting, Food, Place, Intro, Apology, Goodbye, Sentence, Particle
Reply with ONLY the category word, nothing else.`
    );
    return raw.trim().split(/\s/)[0];
  } catch { return 'Vocab'; }
}

async function aiEnhance() {
  const jp = document.getElementById('fieldJp').value.trim();
  const en = document.getElementById('fieldEn').value.trim();
  if (!jp && !en) { toast('Type something first'); return; }

  const btn = document.getElementById('btnAI');
  btn.textContent = '…'; btn.disabled = true;
  toast('AI is filling in…');

  try {
    const raw = await callAI(
      `You help fill in a Japanese vocabulary note. Given what the user wrote, fill in any missing fields.
JP: "${jp}"
EN: "${en}"
Current romaji: "${document.getElementById('fieldRo').value}"
Current furigana: "${document.getElementById('fieldFuri').value}"
Current category: "${document.getElementById('fieldCat').value}"

Reply ONLY with a JSON object (no markdown):
{
  "jp": "Japanese text (keep original if fine)",
  "ro": "romaji reading",
  "furi": "hiragana reading of kanji only, blank if all hiragana already",
  "en": "English meaning",
  "cat": "ONE category from: Vocab, Grammar, Phrase, Verb, Time, Direction, Expression, Greeting, Food, Place, Intro, Apology, Goodbye, Sentence, Particle"
}`
    );
    const clean = raw.replace(/```[\w]*\n?|```/g,'').trim();
    const data = JSON.parse(clean);
    if (data.jp) document.getElementById('fieldJp').value = data.jp;
    if (data.ro) document.getElementById('fieldRo').value = data.ro;
    if (data.furi) document.getElementById('fieldFuri').value = data.furi;
    if (data.en) document.getElementById('fieldEn').value = data.en;
    if (data.cat) document.getElementById('fieldCat').value = data.cat;
    toast('✓ AI filled it in', 'ok');
  } catch(e) {
    toast('AI fill failed', 'err');
  }

  btn.textContent = '✦ AI Fill'; btn.disabled = false;
}

// ── VIEWS ──
function showList() {
  document.getElementById('viewList').classList.add('active');
  document.getElementById('viewEditor').classList.remove('active');
  document.getElementById('fab').classList.remove('hidden');
  renderList();
}

function showEditor(id) {
  editingId = id;
  document.getElementById('viewList').classList.remove('active');
  document.getElementById('viewEditor').classList.add('active');
  document.getElementById('fab').classList.add('hidden');
  const n = id ? notes.find(x => x.id === id) : null;
  document.getElementById('editorLabel').textContent = id ? 'Edit Note' : 'New Note';
  document.getElementById('fieldJp').value   = n?.jp   || '';
  document.getElementById('fieldRo').value   = n?.ro   || '';
  document.getElementById('fieldFuri').value = n?.furi || '';
  document.getElementById('fieldEn').value   = n?.en   || '';
  document.getElementById('fieldCat').value  = n?.cat  || '';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';
  document.getElementById('fieldJp').focus();
}

function setCat(c) { document.getElementById('fieldCat').value = c; }

// ── CRUD ──
async function saveNote() {
  const jp   = document.getElementById('fieldJp').value.trim();
  const ro   = document.getElementById('fieldRo').value.trim();
  const furi = document.getElementById('fieldFuri').value.trim();
  const en   = document.getElementById('fieldEn').value.trim();
  let   cat  = document.getElementById('fieldCat').value.trim();
  if (!jp && !en) { toast('Add some text first!'); return; }

  // auto-cat if blank
  if (!cat) {
    toast('AI picking category…');
    cat = await autoCategory(jp, en);
  }

  if (editingId) {
    const i = notes.findIndex(n => n.id === editingId);
    if (i !== -1) notes[i] = { ...notes[i], jp, ro, furi, en, cat };
  } else {
    notes.unshift({ id: uid(), jp, ro, furi, en, cat, created: Date.now() });
  }
  saveLocal(); showList(); toast('Saved ✓', 'ok');
}

async function deleteNote() {
  if (!editingId || !confirm('Delete this note?')) return;
  notes = notes.filter(n => n.id !== editingId);
  saveLocal(); showList();
}

// ── RENDER ──
function buildJpDisplay(note) {
  // If there's furigana AND kanji in jp, wrap with <ruby>
  if (note.furi && note.jp) {
    // Simple: show jp with furigana as ruby over the whole thing
    return `<ruby>${note.jp}<rt>${note.furi}</rt></ruby>`;
  }
  return note.jp || note.en || '';
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = notes.filter(n =>
    !q || [n.jp, n.ro, n.furi, n.en, n.cat].some(f => f?.toLowerCase().includes(q))
  );
  document.getElementById('noteCount').textContent = `${filtered.length} note${filtered.length !== 1 ? 's' : ''}`;

  const list = document.getElementById('notesList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">📝</div><p>${q ? 'No notes match.' : 'No notes yet.\nTap ＋ to add your first word!'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(n => {
    const isPlaying = playQueue[playIdx]?.id === n.id;
    const jpHtml = buildJpDisplay(n);
    const roHtml = n.ro
      ? `<div class="note-ro${showRomaji ? '' : ' hidden'}">${n.ro}</div>`
      : '';
    return `
    <div class="note-card${isPlaying ? ' playing' : ''}" id="card-${n.id}">
      <div class="note-card-body" onclick="showEditor('${n.id}')">
        <div class="note-jp">${jpHtml}</div>
        ${roHtml}
        <div class="note-en">${n.en || ''}</div>
        ${n.cat ? `<span class="note-cat-tag">${n.cat}</span>` : ''}
      </div>
      <button class="note-card-play" onclick="event.stopPropagation();playSingle('${n.id}')">
        ${isPlaying ? '🔊' : '▶'}
      </button>
    </div>`;
  }).join('');
}

// ── TTS ──
function loadVoices() { voices = window.speechSynthesis.getVoices(); }
window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices();
function getVoice(lang) { return voices.find(v => v.lang.startsWith(lang)) || null; }

function cleanForTTS(text) {
  // strip furigana markers and brackets
  return text.replace(/（[^）]*）|\([^)]*\)/g, '').trim();
}

function speakNote(note, onDone) {
  window.speechSynthesis.cancel();
  updatePlayerUI(note); renderList();
  const parts = [];

  const jpText = cleanForTTS(note.jp || '');
  if (jpText) {
    const u = new SpeechSynthesisUtterance(jpText);
    u.lang = 'ja-JP'; u.rate = speed * 0.82;
    const v = getVoice('ja'); if (v) u.voice = v;
    parts.push(u);
  }

  if (note.en) {
    const u2 = new SpeechSynthesisUtterance(note.en);
    u2.lang = 'en-US'; u2.rate = speed;
    const v2 = getVoice('en'); if (v2) u2.voice = v2;
    if (onDone) u2.onend = onDone;
    parts.push(u2);
  } else if (onDone && parts.length) {
    parts[parts.length - 1].onend = onDone;
  }

  parts.forEach(u => window.speechSynthesis.speak(u));
}

function playSingle(id) {
  const note = notes.find(n => n.id === id); if (!note) return;
  playQueue = [note]; playIdx = 0; isPaused = false;
  showPlayerBar(); speakNote(note);
}

function playAll() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  playQueue = notes.filter(n => !q || [n.jp,n.ro,n.en,n.cat].some(f => f?.toLowerCase().includes(q)));
  if (!playQueue.length) return;
  playIdx = 0; isPaused = false; showPlayerBar(); playFromIdx(0);
}

function playFromIdx(idx) {
  if (isPaused || idx >= playQueue.length) { if (idx >= playQueue.length) stopAll(); return; }
  playIdx = idx;
  speakNote(playQueue[idx], () => { if (!isPaused) setTimeout(() => playFromIdx(idx + 1), 650); });
}

function speakCurrent() {
  const jp = document.getElementById('fieldJp').value.trim();
  const en = document.getElementById('fieldEn').value.trim();
  if (!jp && !en) return;
  playQueue = [{ id: '_p', jp, ro: '', furi: '', en, cat: '' }];
  playIdx = 0; showPlayerBar(); speakNote(playQueue[0]);
}

function togglePause() {
  if (window.speechSynthesis.speaking && !isPaused) {
    isPaused = true; window.speechSynthesis.pause();
    document.getElementById('btnPause').textContent = '▶';
  } else if (isPaused) {
    isPaused = false; window.speechSynthesis.resume();
    document.getElementById('btnPause').textContent = '⏸';
    if (!window.speechSynthesis.speaking) playFromIdx(playIdx);
  }
}
function playNextItem() { isPaused=false; document.getElementById('btnPause').textContent='⏸'; if(playIdx<playQueue.length-1) playFromIdx(playIdx+1); }
function playPrevItem() { isPaused=false; document.getElementById('btnPause').textContent='⏸'; if(playIdx>0) playFromIdx(playIdx-1); }
function stopAll() { window.speechSynthesis.cancel(); isPaused=false; playQueue=[]; playIdx=0; document.getElementById('playerBar').classList.remove('visible'); document.getElementById('btnPause').textContent='⏸'; renderList(); }
function setSpeed(s,el) { speed=s; document.querySelectorAll('.speed-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }
function showPlayerBar() { document.getElementById('playerBar').classList.add('visible'); }
function updatePlayerUI(n) {
  document.getElementById('playerJp').textContent = n.jp || '—';
  document.getElementById('playerEn').textContent = (n.ro && showRomaji ? n.ro + ' · ' : '') + (n.en || '');
}
